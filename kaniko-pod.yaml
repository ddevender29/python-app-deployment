apiVersion: v1
kind: Pod

metadata:
  name: kaniko-pod
  namespace: jenkins

spec:
  containers:
    - name: kaniko
      image: gcr.io/kaniko-project/executor:latest
      tty: true
      volumeMounts:
        - name: docker-config
          mountPath: /kaniko/.docker

  volumes:
    - name: docker-config
      secret:
        secretName: regcred