apiVersion: v1
kind: Pod

metadata:
  labels:
    some-label: kaniko
  namespace: jenkins

spec:
  containers:

  - name: jnlp
    image: jenkins/inbound-agent:latest
    args: ['$(JENKINS_SECRET)', '$(JENKINS_NAME)']

  - name: kaniko
    image: gcr.io/kaniko-project/executor:latest
    tty: true
    volumeMounts:
      - name: docker-config
        mountPath: /kaniko/.docker

  - name: kubectl
    image: bitnami/kubectl:latest
    command:
      - cat
    tty: true

  volumes:
    - name: docker-config
      secret:
        secretName: rgcred